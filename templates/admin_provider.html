{% extends "admin_layout.html" %}

{% block title %}内置接口{% endblock %}
{% block heading %}内置接口配置{% endblock %}

{% block content %}
<section class="mt-8 max-w-4xl rounded-[28px] border border-stone-200 bg-white p-5 shadow-sm">
  <form method="post" action="{{ url_for('admin_provider_update') }}">
    <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
    {% if provider_config.has_api_key %}
    <input type="hidden" name="keep_existing_key" value="on">
    {% endif %}
    <div class="flex items-start justify-between gap-4">
      <div>
        <h3 class="text-lg font-semibold">内置接口</h3>
        <p class="mt-1 text-sm text-stone-500">密钥加密保存在服务端，只在后台 worker 里使用。</p>
      </div>
      <label class="inline-flex items-center gap-2 text-sm text-stone-600">
        <input type="checkbox" name="enabled" {% if provider_config.enabled %}checked{% endif %}>
        启用
      </label>
    </div>

    <div class="mt-5 grid gap-4 sm:grid-cols-2">
      <label class="block sm:col-span-2">
        <span class="mb-2 block text-sm font-medium text-stone-600">Base URL</span>
        <input name="base_url" value="{{ provider_config.base_url }}" class="w-full rounded-2xl border border-stone-200 bg-stone-50 px-4 py-3 text-sm outline-none focus:border-stone-400" placeholder="https://api.example.com">
      </label>
      <label class="block sm:col-span-2">
        <span class="mb-2 block text-sm font-medium text-stone-600">API Key（{{ provider_config.api_key_masked }}）</span>
        <input type="password" name="api_key" class="w-full rounded-2xl border border-stone-200 bg-stone-50 px-4 py-3 text-sm outline-none focus:border-stone-400" placeholder="留空则保留已有密钥">
      </label>
      <label class="block">
        <span class="mb-2 block text-sm font-medium text-stone-600">默认模型</span>
        <input name="model" value="{{ provider_config.model }}" class="w-full rounded-2xl border border-stone-200 bg-stone-50 px-4 py-3 text-sm outline-none focus:border-stone-400">
      </label>
      <label class="block">
        <span class="mb-2 block text-sm font-medium text-stone-600">每张图积分</span>
        <input type="number" min="0" name="price_per_image" value="{{ provider_config.price_per_image }}" class="w-full rounded-2xl border border-stone-200 bg-stone-50 px-4 py-3 text-sm outline-none focus:border-stone-400">
      </label>
      <label class="block">
        <span class="mb-2 block text-sm font-medium text-stone-600">最大并发任务</span>
        <input type="number" min="1" max="5" name="max_concurrent_jobs" value="{{ provider_config.max_concurrent_jobs }}" class="w-full rounded-2xl border border-stone-200 bg-stone-50 px-4 py-3 text-sm outline-none focus:border-stone-400">
      </label>
      <label class="block">
        <span class="mb-2 block text-sm font-medium text-stone-600">单用户排队上限</span>
        <input type="number" min="1" max="20" name="per_user_pending_limit" value="{{ provider_config.per_user_pending_limit }}" class="w-full rounded-2xl border border-stone-200 bg-stone-50 px-4 py-3 text-sm outline-none focus:border-stone-400">
      </label>
    </div>
    <button class="mt-5 rounded-full bg-stone-900 px-5 py-3 text-sm font-medium text-white" type="submit">保存内置接口</button>
  </form>
</section>
{% endblock %}
