<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ "登录" if mode == "login" else "注册" }} - AI Image Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-stone-50 text-stone-900">
    <main class="flex min-h-screen items-center justify-center px-4 py-10">
      <section class="w-full max-w-md rounded-[32px] border border-stone-200 bg-white p-6 shadow-xl shadow-stone-200/60">
        <div class="text-center">
          <p class="text-xs font-medium uppercase tracking-wide text-stone-400">AI Image Studio</p>
          <h1 class="mt-2 text-3xl font-semibold tracking-tight">{{ "登录账号" if mode == "login" else "创建账号" }}</h1>
          <p class="mt-2 text-sm text-stone-500">
            {% if mode == "login" %}
              登录后可以查看自己的私有生成记录。
            {% else %}
              创建账号后可使用站内内置接口和私有生成记录。
            {% endif %}
          </p>
        </div>

        <form method="post" class="mt-6 space-y-4">
          <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
          <label class="block">
            <span class="mb-2 block text-sm font-medium text-stone-600">用户名</span>
            <input name="username" autocomplete="username" required class="w-full rounded-2xl border border-stone-200 bg-stone-50 px-4 py-3 text-sm outline-none focus:border-stone-400" placeholder="your-name">
          </label>
          <label class="block">
            <span class="mb-2 block text-sm font-medium text-stone-600">密码</span>
            <input type="password" name="password" autocomplete="{{ "current-password" if mode == "login" else "new-password" }}" required class="w-full rounded-2xl border border-stone-200 bg-stone-50 px-4 py-3 text-sm outline-none focus:border-stone-400" placeholder="至少 8 位">
          </label>
          <button class="w-full rounded-full bg-stone-900 px-5 py-3 text-sm font-medium text-white hover:bg-black" type="submit">
            {{ "登录" if mode == "login" else "注册并登录" }}
          </button>
        </form>

        <div class="mt-5 text-center text-sm text-stone-500">
          {% if mode == "login" %}
            还没有账号？<a class="font-medium text-stone-900 underline" href="{{ url_for('register') }}">去注册</a>
          {% else %}
            已经有账号？<a class="font-medium text-stone-900 underline" href="{{ url_for('login') }}">去登录</a>
          {% endif %}
        </div>

        <div class="mt-6 text-center">
          <a class="text-sm text-stone-500 hover:text-stone-900" href="{{ url_for('index') }}">返回首页</a>
        </div>
      </section>
    </main>

    {% include "_modal_messages.html" %}
  </body>
</html>
